<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>謊言與毛球 — 視覺小說</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0a1e;
    --panel: rgba(18,12,40,0.92);
    --accent: #f7a8d0;
    --accent2: #a8c4f7;
    --gold: #f7d98a;
    --danger: #f76a6a;
    --text: #f0e8ff;
    --subtext: #b8aad4;
    --border: rgba(247,168,208,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Noto Sans TC', sans-serif;
    width: 100vw; height: 100vh;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── 星空背景 ── */
  #stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(100,60,180,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(60,100,200,0.15) 0%, transparent 50%);
  }

  /* ── 遊戲容器 ── */
  #game {
    position: relative;
    width: min(900px, 100vw);
    height: min(600px, 100vh);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(180,100,240,0.25), 0 0 200px rgba(60,40,120,0.4);
    z-index: 1;
  }

  /* ── 場景背景 ── */
  #scene-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    transition: all 0.6s ease;
  }

  #scene-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 40%, rgba(8,5,20,0.85) 100%);
  }

  /* ── 角色立繪區 ── */
  #characters {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 50px;
    pointer-events: none;
  }

  .character {
    height: 92%;
    width: auto;
    flex-shrink: 0;
    transition: all 0.5s ease;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.6));
  }

  .character.hidden { opacity: 0; transform: translateY(20px); }
  .character.active { filter: drop-shadow(0 8px 24px rgba(0,0,0,0.6)) brightness(1.1); }
  .character.dimmed { filter: drop-shadow(0 8px 24px rgba(0,0,0,0.6)) brightness(0.5) saturate(0.4); }

  .char-svg {
    height: 100%;
    width: auto;
    display: block;
  }

  /* ── 貓咪立繪 ── */
  #cat-display {
    position: absolute;
    bottom: 155px; right: 60px;
    width: 120px; height: 120px;
    transition: all 0.5s ease;
    filter: drop-shadow(0 4px 12px rgba(247,168,208,0.4));
  }
  #cat-display.hidden { opacity: 0; transform: scale(0.8); }

  /* ── 對話框 ── */
  #dialog-box {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 160px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(20px);
    padding: 16px 24px 16px;
    display: flex; flex-direction: column; gap: 8px;
  }

  #dialog-box::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  }

  #speaker-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    min-height: 20px;
    text-shadow: 0 0 12px rgba(247,168,208,0.5);
  }

  #dialog-text {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    flex: 1;
    white-space: pre-wrap;
  }

  #dialog-text .cursor {
    display: inline-block;
    width: 2px; height: 14px;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.8s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── 點擊提示 ── */
  #click-hint {
    position: absolute;
    bottom: 12px; right: 20px;
    font-size: 11px;
    color: var(--subtext);
    opacity: 0;
    transition: opacity 0.5s;
    display: flex; align-items: center; gap: 6px;
  }
  #click-hint.show { opacity: 1; animation: bounce 1s infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }

  /* ── 選項按鈕 ── */
  #choices {
    position: absolute;
    bottom: 170px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; gap: 10px;
    width: 480px;
    z-index: 10;
  }

  .choice-btn {
    background: rgba(18,10,40,0.88);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 24px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    backdrop-filter: blur(10px);
    transition: all 0.2s ease;
    position: relative; overflow: hidden;
  }

  .choice-btn::before {
    content: '▶';
    color: var(--accent);
    margin-right: 10px;
    font-size: 10px;
    transition: transform 0.2s;
  }

  .choice-btn:hover {
    border-color: var(--accent);
    background: rgba(247,168,208,0.1);
    transform: translateX(4px);
    box-shadow: 0 0 16px rgba(247,168,208,0.2);
  }

  /* ── 場景章節標題 ── */
  #chapter-card {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    background: rgba(8,5,20,0.92);
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
  }
  #chapter-card.show { opacity: 1; pointer-events: all; }

  #chapter-num {
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--accent);
    text-transform: uppercase;
  }

  #chapter-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 32px;
    color: var(--text);
    letter-spacing: 4px;
    text-align: center;
  }

  #chapter-line {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  #chapter-sub {
    font-size: 13px;
    color: var(--subtext);
    letter-spacing: 2px;
  }

  /* ── 頂部 HUD ── */
  #hud {
    position: absolute;
    top: 16px; left: 20px; right: 20px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 5; pointer-events: none;
  }

  #game-title-hud {
    font-family: 'Noto Serif TC', serif;
    font-size: 12px;
    color: rgba(247,168,208,0.5);
    letter-spacing: 3px;
  }

  #progress-indicator {
    font-size: 11px;
    color: var(--subtext);
    letter-spacing: 1px;
  }

  /* ── 情緒指示條 ── */
  #emotion-bar {
    position: absolute;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 6px; align-items: center;
    z-index: 5;
  }

  .emo-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.4s;
  }
  .emo-dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

  /* ── 畫面閃白效果 ── */
  #flash {
    position: absolute; inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 30;
    transition: opacity 0.15s;
  }

  /* ── 結局畫面 ── */
  #ending-screen {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #0d0a1e, #1a0830);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    z-index: 40;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.5s ease;
  }
  #ending-screen.show { opacity: 1; pointer-events: all; }

  #ending-badge {
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--gold);
    text-shadow: 0 0 16px rgba(247,217,138,0.6);
  }

  #ending-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 36px;
    color: var(--text);
    text-align: center;
    line-height: 1.4;
  }

  #ending-desc {
    font-size: 13px;
    color: var(--subtext);
    text-align: center;
    max-width: 400px;
    line-height: 2;
  }

  #restart-btn {
    margin-top: 16px;
    padding: 12px 36px;
    border: 1px solid var(--accent);
    border-radius: 4px;
    background: transparent;
    color: var(--accent);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.3s;
  }
  #restart-btn:hover {
    background: rgba(247,168,208,0.1);
    box-shadow: 0 0 20px rgba(247,168,208,0.3);
  }

  /* ── 開始畫面 ── */
  #title-screen {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, #0a0718 0%, #150d2e 50%, #0a0a1a 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
    z-index: 50;
    transition: opacity 1s ease;
  }

  #title-screen.fade-out { opacity: 0; pointer-events: none; }

  .title-deco {
    font-size: 11px;
    letter-spacing: 8px;
    color: var(--accent);
    opacity: 0.7;
  }

  #main-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 44px;
    color: var(--text);
    letter-spacing: 6px;
    text-align: center;
    text-shadow: 0 0 30px rgba(247,168,208,0.4);
    line-height: 1.3;
  }

  #main-subtitle {
    font-size: 13px;
    color: var(--subtext);
    letter-spacing: 3px;
  }

  #start-btn {
    margin-top: 30px;
    padding: 14px 48px;
    border: 1px solid var(--accent);
    border-radius: 4px;
    background: rgba(247,168,208,0.06);
    color: var(--accent);
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    letter-spacing: 4px;
    cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
  }

  #start-btn:hover {
    background: rgba(247,168,208,0.15);
    box-shadow: 0 0 30px rgba(247,168,208,0.3);
    transform: scale(1.03);
  }

  .title-paw {
    font-size: 28px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100%{transform:translateY(0) rotate(-5deg)}
    50%{transform:translateY(-8px) rotate(5deg)}
  }

  /* ── 場景淡入 ── */
  @keyframes fadeInScene {
    from { opacity: 0; transform: scale(1.03); }
    to { opacity: 1; transform: scale(1); }
  }
  .scene-enter { animation: fadeInScene 0.6s ease forwards; }
</style>
</head>
<body>

<div id="stars"></div>

<div id="game" onclick="handleClick()">

  <!-- 開始畫面 -->
  <div id="title-screen">
    <div class="title-paw">🐾</div>
    <div class="title-deco">VISUAL NOVEL</div>
    <div id="main-title">謊言與<br>毛球</div>
    <div id="main-subtitle">— 那隻貓，知道所有秘密 —</div>
    <button id="start-btn" onclick="startGame()">開始故事</button>
    <div style="font-size:11px; color:rgba(255,255,255,0.2); margin-top:20px; letter-spacing:2px;">點擊對話可繼續</div>
    <div style="font-size:10px; color:rgba(247,168,208,0.3); letter-spacing:2px;">v11</div>
  </div>

  <!-- 場景背景 -->
  <div id="scene-bg"></div>
  <div id="scene-overlay"></div>

  <!-- HUD -->
  <div id="hud">
    <div id="game-title-hud">謊言與毛球</div>
    <div id="progress-indicator"></div>
  </div>

  <div id="emotion-bar">
    <div class="emo-dot" id="d1"></div>
    <div class="emo-dot" id="d2"></div>
    <div class="emo-dot" id="d3"></div>
    <div class="emo-dot" id="d4"></div>
    <div class="emo-dot" id="d5"></div>
  </div>

  <!-- 章節卡片 -->
  <div id="chapter-card">
    <div id="chapter-num"></div>
    <div id="chapter-line"></div>
    <div id="chapter-title"></div>
    <div id="chapter-sub"></div>
  </div>

  <!-- 角色立繪 -->
  <div id="characters">
    <div class="character hidden" id="char-yuqing"></div>
    <div class="character hidden" id="char-rin"></div>
    <div class="character hidden" id="char-seller"></div>
    <div class="character hidden" id="char-vet"></div>
    <div class="character hidden" id="char-police"></div>
  </div>

  <!-- 貓咪 -->
  <div id="cat-display" class="hidden"></div>

  <!-- 對話框 -->
  <div id="dialog-box">
    <div id="speaker-name"></div>
    <div id="dialog-text"></div>
    <div id="click-hint">▼ 點擊繼續</div>
  </div>

  <!-- 選項 -->
  <div id="choices"></div>

  <!-- 閃白 -->
  <div id="flash"></div>

  <!-- 結局畫面 -->
  <div id="ending-screen">
    <div id="ending-badge">ENDING</div>
    <div id="ending-title">那隻貓，<br>完成了任務</div>
    <div id="ending-desc">
      「星空集團」走私案正式移送法辦<br>
      失蹤的李明，平安現身<br>
      而小橘，找到了她真正的家<br>
      還有，說出口之前的那些話
    </div>
    <button id="restart-btn" onclick="location.reload()">再讀一遍</button>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════
//   SVG 角色立繪生成器
// ═══════════════════════════════════════════════════════

function makePlayerSVG(expression = 'normal') {
  const eyes = {
    normal: `<ellipse cx="72" cy="88" rx="5" ry="5.5" fill="#3a2a5a"/>
             <ellipse cx="128" cy="88" rx="5" ry="5.5" fill="#3a2a5a"/>
             <circle cx="73" cy="86" r="1.5" fill="white"/>
             <circle cx="129" cy="86" r="1.5" fill="white"/>`,
    happy: `<path d="M67 88 Q72 82 77 88" stroke="#3a2a5a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <path d="M123 88 Q128 82 133 88" stroke="#3a2a5a" stroke-width="2.5" fill="none" stroke-linecap="round"/>`,
    angry: `<ellipse cx="72" cy="90" rx="5" ry="4.5" fill="#3a2a5a"/>
            <ellipse cx="128" cy="90" rx="5" ry="4.5" fill="#3a2a5a"/>
            <line x1="65" y1="83" x2="79" y2="87" stroke="#3a2a5a" stroke-width="2"/>
            <line x1="121" y1="87" x2="135" y2="83" stroke="#3a2a5a" stroke-width="2"/>`,
    sad: `<path d="M67 86 Q72 92 77 86" stroke="#3a2a5a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <path d="M123 86 Q128 92 133 86" stroke="#3a2a5a" stroke-width="2.5" fill="none" stroke-linecap="round"/>`,
    determined: `<ellipse cx="72" cy="89" rx="5" ry="5" fill="#2a1a4a"/>
                 <ellipse cx="128" cy="89" rx="5" ry="5" fill="#2a1a4a"/>
                 <circle cx="74" cy="87" r="2" fill="white"/>
                 <circle cx="130" cy="87" r="2" fill="white"/>
                 <line x1="65" y1="82" x2="80" y2="85" stroke="#3a2a5a" stroke-width="2"/>
                 <line x1="120" y1="85" x2="135" y2="82" stroke="#3a2a5a" stroke-width="2"/>`
  };

  const mouths = {
    normal: `<path d="M90 106 Q100 110 110 106" stroke="#c87090" stroke-width="1.5" fill="none" stroke-linecap="round"/>`,
    happy: `<path d="M88 104 Q100 114 112 104" stroke="#c87090" stroke-width="2" fill="none" stroke-linecap="round"/>`,
    angry: `<path d="M88 110 Q100 104 112 110" stroke="#c87090" stroke-width="2" fill="none" stroke-linecap="round"/>`,
    sad: `<path d="M90 110 Q100 104 110 110" stroke="#9070a0" stroke-width="1.5" fill="none" stroke-linecap="round"/>`,
    determined: `<path d="M90 108 L110 108" stroke="#c87090" stroke-width="2" stroke-linecap="round"/>`
  };

  const exp = expression in eyes ? expression : 'normal';
  return `<svg viewBox="0 0 200 340" xmlns="http://www.w3.org/2000/svg" class="char-svg">
    <!-- 頭髮後層 -->
    <ellipse cx="100" cy="70" rx="52" ry="58" fill="#2a1a4a"/>
    <!-- 脖子 -->
    <rect x="86" y="130" width="28" height="30" rx="6" fill="#f5c5a0"/>
    <!-- 身體 -->
    <rect x="52" y="155" width="96" height="140" rx="20" fill="#e8d4f0"/>
    <!-- 衣服細節 -->
    <rect x="52" y="155" width="96" height="50" rx="20" fill="#c4a8e0"/>
    <circle cx="100" cy="175" r="4" fill="#a088c0"/>
    <!-- 手臂 -->
    <rect x="20" y="160" width="36" height="80" rx="16" fill="#e8d4f0"/>
    <rect x="144" y="160" width="36" height="80" rx="16" fill="#e8d4f0"/>
    <!-- 臉 -->
    <ellipse cx="100" cy="95" rx="46" ry="50" fill="#f5c5a0"/>
    <!-- 頭髮前層 -->
    <ellipse cx="100" cy="52" rx="50" ry="30" fill="#2a1a4a"/>
    <ellipse cx="58" cy="72" rx="16" ry="36" fill="#2a1a4a"/>
    <ellipse cx="142" cy="72" rx="16" ry="36" fill="#2a1a4a"/>
    <!-- 瀏海 -->
    <path d="M55 65 Q68 38 100 35 Q132 38 145 65 Q130 52 100 50 Q70 52 55 65Z" fill="#2a1a4a"/>
    <!-- 耳朵 -->
    <ellipse cx="54" cy="95" rx="10" ry="12" fill="#f5c5a0"/>
    <ellipse cx="146" cy="95" rx="10" ry="12" fill="#f5c5a0"/>
    <!-- 眼睛 -->
    ${eyes[exp]}
    <!-- 鼻子 -->
    <ellipse cx="100" cy="100" rx="3" ry="2" fill="#e0a0a0"/>
    <!-- 嘴巴 -->
    ${mouths[exp]}
    <!-- 腮紅 -->
    <ellipse cx="76" cy="104" rx="8" ry="5" fill="rgba(255,150,150,0.3)"/>
    <ellipse cx="124" cy="104" rx="8" ry="5" fill="rgba(255,150,150,0.3)"/>
    <!-- 腿 -->
    <rect x="66" y="285" width="28" height="50" rx="12" fill="#e8d4f0"/>
    <rect x="106" y="285" width="28" height="50" rx="12" fill="#e8d4f0"/>
    <rect x="60" y="326" width="36" height="14" rx="7" fill="#8068a8"/>
    <rect x="104" y="326" width="36" height="14" rx="7" fill="#8068a8"/>
  </svg>`;
}

function makeSellerSVG(expression = 'normal') {
  const eyes = {
    normal: `<ellipse cx="72" cy="85" rx="5" ry="5" fill="#2a3a2a"/>
             <ellipse cx="128" cy="85" rx="5" ry="5" fill="#2a3a2a"/>
             <circle cx="74" cy="83" r="1.5" fill="white"/>
             <circle cx="130" cy="83" r="1.5" fill="white"/>`,
    sly: `<path d="M67 83 Q72 79 77 83 Q72 87 67 83Z" fill="#2a3a2a"/>
          <path d="M123 83 Q128 79 133 83 Q128 87 123 83Z" fill="#2a3a2a"/>
          <circle cx="72" cy="83" r="1.2" fill="white"/>
          <circle cx="128" cy="83" r="1.2" fill="white"/>`,
    scared: `<ellipse cx="72" cy="85" rx="6" ry="7" fill="#2a3a2a"/>
             <ellipse cx="128" cy="85" rx="6" ry="7" fill="#2a3a2a"/>
             <circle cx="72" cy="82" r="2.5" fill="white"/>
             <circle cx="128" cy="82" r="2.5" fill="white"/>`,
    panic: `<ellipse cx="72" cy="87" rx="7" ry="8" fill="#2a3a2a"/>
            <ellipse cx="128" cy="87" rx="7" ry="8" fill="#2a3a2a"/>
            <circle cx="72" cy="83" r="3" fill="white"/>
            <circle cx="128" cy="83" r="3" fill="white"/>
            <line x1="65" y1="78" x2="79" y2="80" stroke="#2a3a2a" stroke-width="2"/>
            <line x1="121" y1="80" x2="135" y2="78" stroke="#2a3a2a" stroke-width="2"/>`
  };
  const mouths = {
    normal: `<path d="M88 105 Q100 112 112 105" stroke="#a06060" stroke-width="2" fill="none" stroke-linecap="round"/>`,
    sly: `<path d="M88 105 Q100 110 112 105" stroke="#a06060" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M108 104 Q112 108 112 105" stroke="#a06060" stroke-width="1.5" fill="none"/>`,
    scared: `<ellipse cx="100" cy="110" rx="10" ry="6" fill="#a06060" opacity="0.6"/>`,
    panic: `<ellipse cx="100" cy="112" rx="12" ry="8" fill="#a06060" opacity="0.7"/>`
  };
  const exp = expression in eyes ? expression : 'normal';
  const mexp = expression in mouths ? expression : 'normal';

//   角色渲染（優先用 ASSETS 圖片，否則退回 SVG）
// ═══════════════════════════════════════════════════════
function renderChar(id, expression) {
  const charAssets = ASSETS.characters[id];
  if (charAssets) {
    const url = charAssets[expression] || charAssets['normal'] || charAssets['default'];
    if (url) return `<img src="${url}" style="height:100%;width:auto;display:block;object-fit:contain;object-position:bottom center" draggable="false">`;
  }
  if (id === 'yuqing')  return makePlayerSVG(expression || 'normal');
  if (id === 'rin')     return makeRinSVG(expression || 'neutral');
  if (id === 'seller')  return makeSellerSVG(expression || 'normal');
  if (id === 'vet')     return makeVetSVG();
  if (id === 'police')  return makePoliceSVG();
  return '';
}

// ═══════════════════════════════════════════════════════
//   遊戲引擎
// ═══════════════════════════════════════════════════════

let scriptIndex = 0;
let isTyping = false;
let typeTimer = null;
let typeResolve = null;
let waitingForClick = false;
let jumpTo = null;

const CHAR_DELAY = 38;

function el(id) { return document.getElementById(id); }

function showChapter(num, title, sub) {
  return new Promise(resolve => {
    const card = el('chapter-card');
    el('chapter-num').textContent = num;
    el('chapter-title').textContent = title;
    el('chapter-sub').textContent = sub;
    card.classList.add('show');
    setTimeout(() => {
      card.classList.remove('show');
      setTimeout(resolve, 800);
    }, 2200);
  });
}

function typeText(text, target) {
  return new Promise(resolve => {
    typeResolve = resolve;
    target.innerHTML = '';
    let i = 0;
    isTyping = true;
    typeTimer = setInterval(() => {
      if (i < text.length) {
        const char = text[i];
        if (char === '\n') {
          target.innerHTML += '<br>';
        } else {
          target.innerHTML += char;
        }
        i++;
      } else {
        clearInterval(typeTimer);
        isTyping = false;
        typeResolve = null;
        target.innerHTML += '<span class="cursor"></span>';
        el('click-hint').classList.add('show');
        resolve();
      }
    }, CHAR_DELAY);
  });
}

function skipTyping(text, target) {
  clearInterval(typeTimer);
  isTyping = false;
  let html = text.replace(/\n/g, '<br>') + '<span class="cursor"></span>';
  target.innerHTML = html;
  el('click-hint').classList.add('show');
  if (typeResolve) { typeResolve(); typeResolve = null; }
}

function updateCharacters(charConfig) {
  const chars = ['yuqing', 'rin', 'seller', 'vet', 'police'];
  chars.forEach(id => {
    const el_c = el('char-' + id);
    if (!el_c) return;
    el_c.classList.add('hidden');
    el_c.classList.remove('active', 'dimmed');
    el_c.innerHTML = '';
  });

  setTimeout(() => {
    chars.forEach(id => {
      const cfg = charConfig[id];
      if (!cfg && cfg !== false) return;
      const el_c = el('char-' + id);
      el_c.innerHTML = renderChar(id, cfg === true ? 'default' : (cfg || 'normal'));
      el_c.classList.remove('hidden');
    });
  }, 100);
}

function updateCharExpressions(step) {
  const expMap = { yuqing: step.yuqing, rin: step.rin, seller: step.seller, vet: step.vet, police: step.police };
  Object.entries(expMap).forEach(([id, exp]) => {
    if (exp === undefined) return;
    const c = el('char-' + id);
    if (!c || c.classList.contains('hidden')) return;
    c.innerHTML = renderChar(id, exp === true ? 'default' : (exp || 'normal'));
  });
}

function showCat(type) {
  const catEl = el('cat-display');
  if (!type) { catEl.classList.add('hidden'); return; }
  const imgUrl = ASSETS.cat[type];
  if (imgUrl) {
    catEl.innerHTML = `<img src="${imgUrl}" style="width:100%;height:100%;object-fit:contain" draggable="false">`;
  } else {
    catEl.innerHTML = makeCatSVG(type === 'healthy');
  }
  catEl.classList.remove('hidden');
}

function setBg(scene) {
  const bg = el('scene-bg');
  const imgUrl = ASSETS.backgrounds[scene];
  if (imgUrl) {
    bg.style.background = '';
    bg.style.backgroundImage = `url('${imgUrl}')`;
    bg.style.backgroundSize = 'cover';
    bg.style.backgroundPosition = 'center';
  } else {
    bg.style.backgroundImage = '';
    bg.style.background = makeBgCSS(scene);
  }
}

function doFlash() {
  const f = el('flash');
  f.style.opacity = '1';
  setTimeout(() => { f.style.opacity = '0'; }, 200);
}

function updateProgress(idx) {
  const total = SCRIPT.filter(s => s.type !== 'chapter' && s.type !== 'goto' && !s.id && s.speaker).length;
  const done = SCRIPT.slice(0, idx).filter(s => s.speaker).length;
  el('progress-indicator').textContent = `${done} / ${total}`;
  const pct = Math.min(done / total * 5, 5);
  document.querySelectorAll('.emo-dot').forEach((d, i) => {
    d.classList.toggle('active', i < pct);
  });
}

function showChoices(step) {
  const choicesEl = el('choices');
  choicesEl.innerHTML = '';
  el('dialog-box').style.cursor = 'default';
  el('click-hint').classList.remove('show');

  el('speaker-name').textContent = '';
  el('dialog-text').innerHTML = `<span style="color:var(--subtext);font-size:13px">${step.text}</span>`;

  step.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = opt.text;
    btn.onclick = (e) => {
      e.stopPropagation();
      choicesEl.innerHTML = '';
      el('dialog-box').style.cursor = 'pointer';
      jumpTo = opt.next;
      advanceScript();
    };
    choicesEl.appendChild(btn);
  });
}

async function advanceScript() {
  if (isTyping) {
    const textEl = el('dialog-text');
    const step = SCRIPT[scriptIndex - 1];
    if (step && step.text) {
      skipTyping(step.text, textEl);
    }
    return;
  }

  el('click-hint').classList.remove('show');

  // Handle jumpTo
  if (jumpTo) {
    const target = jumpTo;
    jumpTo = null;
    const targetIdx = SCRIPT.findIndex(s => s.id === target);
    if (targetIdx !== -1) scriptIndex = targetIdx;
  }

  while (scriptIndex < SCRIPT.length) {
    const step = SCRIPT[scriptIndex];
    scriptIndex++;

    // Skip IDs and goto markers silently
    if (step.id || step.type === 'goto') {
      if (step.type === 'goto') {
        const ti = SCRIPT.findIndex(s => s.id === step.target);
        if (ti !== -1) { scriptIndex = ti; }
      }
      continue;
    }

    if (step.type === 'chapter') {
      await showChapter(step.num, step.title, step.sub);
      continue;
    }

    if (step.type === 'ending') {
      setTimeout(() => {
        el('ending-screen').classList.add('show');
      }, 600);
      return;
    }

    if (step.flash) {
      doFlash();
      continue;
    }

    if (step.bg) { setBg(step.bg); }
    if (step.chars) { updateCharacters(step.chars); }
    if (step.cat !== undefined) { showCat(step.cat === false ? null : step.cat); }

    if (step.type === 'choice') {
      showChoices(step);
      return;
    }

    if (step.speaker) {
      // Update expressions
      updateCharExpressions(step);

      // Dim/activate characters
      const speakers = {
        '雨晴': 'yuqing', '謝 凜': 'rin',
        '林 詐欺': 'seller', '陳 警官': 'police', '王 獸醫': 'vet'
      };
      const activeSpeaker = speakers[step.speaker];
      ['yuqing', 'rin', 'seller', 'vet', 'police'].forEach(id => {
        const c = el('char-' + id);
        if (c.classList.contains('hidden')) return;
        if (activeSpeaker === id) {
          c.classList.add('active'); c.classList.remove('dimmed');
        } else {
          c.classList.add('dimmed'); c.classList.remove('active');
        }
      });

      // Name color
      const nameColors = {
        '雨晴': 'var(--accent)',
        '謝 凜': '#7ab0e0',
        '林 詐欺': '#a0d870',
        '王 獸醫': 'var(--accent2)',
        '陳 警官': 'var(--gold)',
        '（旁白）': 'var(--subtext)',
        '（字條）': '#d4b870',
        '（法官宣判）': 'var(--gold)'
      };
      const nc = el('speaker-name');
      nc.textContent = step.speaker;
      nc.style.color = nameColors[step.speaker] || 'var(--accent)';

      updateProgress(scriptIndex);
      await typeText(step.text, el('dialog-text'));
      waitingForClick = true;
      return;
    }
  }
}

function handleClick() {
  if (el('choices').children.length > 0) return;
  if (isTyping) {
    const step = SCRIPT[scriptIndex - 1];
    if (step && step.text) {
      skipTyping(step.text, el('dialog-text'));
    }
    return;
  }
  if (waitingForClick) {
    waitingForClick = false;
    advanceScript();
  }
}

function startGame() {
  const ts = el('title-screen');
  ts.classList.add('fade-out');
  setTimeout(() => {
    ts.style.display = 'none';
    advanceScript();
  }, 1000);
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    handleClick();
  }
});
</script>
</body>
</html>
